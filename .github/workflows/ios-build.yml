name: Build iOS

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Build web app
        run: npm run build
      - name: Ensure iOS platform
        run: |
          if [ ! -d ios ]; then npx cap add ios; fi
          npx cap sync ios
      - name: Build IPA
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -destination 'generic/platform=iOS' -derivedDataPath ./build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          APP_PATH=$(find ./build -name "*.app" -type d | head -1)
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/App.app
          zip -r App.ipa Payload
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/App/App.ipa
