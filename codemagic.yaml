# Codemagic CI/CD for Word Fall
# App: https://github.com/mattypatty918-wq/word-drop-game
# Bundle ID: com.mattypattysapps.wordfall

environment:
  appId: com.mattypattysapps.wordfall
  types:
    - ios
  node: v18

workflows:
  ios-workflow:
    name: iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        BUNDLE_ID: "com.mattypattysapps.wordfall"
        XCODE_WORKSPACE: "App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APP_ID: ""
    triggering:
      events:
        - push
        - tag
      branch-patterns:
        - pattern: master
          include: true
    scripts:
      - npm install
      - npx cap sync ios
      - cd ios/App && pod install
      - keychain initialize
      - app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
      - keychain add-certificates
      - xcode-project use-profiles
      - xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration