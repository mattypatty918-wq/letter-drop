name: Word Fall
description: Addicting word puzzle game - drop and connect letters
type: ios
environment:
  ios: "17.0"
  node: "18"
workflows:
  ios-workflow:
    name: iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        BUNDLE_ID: com.mattypattysapps.wordfall
        XCODE_WORKSPACE: App/App.xcworkspace
        XCODE_SCHEME: App
    scripts:
      - npm install
      - npx cap sync ios
      - cd ios/App && pod install
      - keychain initialize
      - app-store-connect fetch-signing-files $BUNDLE_ID --type IOS_APP_STORE --create
      - keychain add-certificates
      - xcode-project use-profiles
      - xcode-project build-ipa --workspace $XCODE_WORKSPACE --scheme $XCODE_SCHEME
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration