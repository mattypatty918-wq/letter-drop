# Codemagic CI/CD for LetterDrop
workflows:
  ios-workflow:
    name: iOS
    max_build_duration: 60
    environment:
      vars:
        XCODE_VERSION: "15.0"
        APP_NAME: "LetterDrop"
    triggering:
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - git clone https://github.com/mattypatty918-wq/letter-drop.git --depth 1
      - cd letter-drop && git submodule update --init --recursive
      - cd letter-drop && xcode-project fetch-dependencies --use-cache
      - cd letter-drop && xcode-project build --workspace ios/App.xcworkspace --scheme App --configuration Release
    artifacts:
      - letter-drop/ios/App/App.xcarchive
    publishing:
      app_store_connect:
        api_key: Whitefoxes